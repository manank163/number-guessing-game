<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Number Guessing Game</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Segoe UI', sans-serif;
      background: #1a1a2e;
      color: #eee;
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
    }

    .card {
      background: #16213e;
      border: 1px solid #0f3460;
      border-radius: 16px;
      padding: 2.5rem;
      width: 380px;
      text-align: center;
      box-shadow: 0 8px 32px rgba(0,0,0,0.4);
    }

    h1 { font-size: 1.6rem; margin-bottom: 0.4rem; }
    .subtitle { color: #a0aec0; font-size: 0.9rem; margin-bottom: 1.8rem; }

    .attempts-bar {
      display: flex;
      justify-content: center;
      gap: 6px;
      margin-bottom: 1.8rem;
    }

    .dot {
      width: 14px; height: 14px;
      border-radius: 50%;
      background: #2d3748;
      border: 2px solid #4a5568;
      transition: background 0.3s;
    }
    .dot.used   { background: #e53e3e; border-color: #e53e3e; }
    .dot.active { background: #48bb78; border-color: #48bb78; animation: pulse 1s infinite; }

    @keyframes pulse {
      0%, 100% { transform: scale(1); }
      50%       { transform: scale(1.2); }
    }

    .input-row {
      display: flex;
      gap: 8px;
      margin-bottom: 1rem;
    }

    input[type="number"] {
      flex: 1;
      padding: 0.75rem 1rem;
      border-radius: 8px;
      border: 2px solid #2d3748;
      background: #0d1b2a;
      color: #eee;
      font-size: 1.1rem;
      text-align: center;
      outline: none;
      transition: border-color 0.2s;
    }
    input[type="number"]:focus { border-color: #4299e1; }
    input[type="number"]::-webkit-inner-spin-button { -webkit-appearance: none; }

    button {
      padding: 0.75rem 1.2rem;
      border: none;
      border-radius: 8px;
      background: #4299e1;
      color: #fff;
      font-size: 1rem;
      cursor: pointer;
      transition: background 0.2s;
    }
    button:hover  { background: #3182ce; }
    button:disabled { background: #2d3748; cursor: not-allowed; }

    .message {
      min-height: 2.5rem;
      font-size: 1.1rem;
      font-weight: 600;
      margin-bottom: 1rem;
      transition: color 0.3s;
    }
    .message.too-low  { color: #68d391; }
    .message.too-high { color: #fc8181; }
    .message.win      { color: #f6e05e; }
    .message.lose     { color: #e53e3e; }
    .message.hint     { color: #a0aec0; }

    .history {
      max-height: 120px;
      overflow-y: auto;
      text-align: left;
      font-size: 0.82rem;
      color: #718096;
      border-top: 1px solid #2d3748;
      padding-top: 0.8rem;
      margin-top: 0.8rem;
    }
    .history span { display: block; padding: 1px 0; }

    .play-again {
      margin-top: 1rem;
      background: #553c9a;
    }
    .play-again:hover { background: #44337a; }
  </style>
</head>
<body>
<div class="card">
  <h1>🎮 Number Guessing</h1>
  <p class="subtitle">Pick a number between <strong>1</strong> and <strong>100</strong></p>

  <div class="attempts-bar" id="dotsBar"></div>

  <div class="input-row">
    <input type="number" id="guessInput" min="1" max="100" placeholder="Your guess…" />
    <button id="guessBtn" onclick="submitGuess()">Guess</button>
  </div>

  <div class="message hint" id="message">Starting game…</div>

  <div class="history" id="history"></div>

  <button class="play-again" id="restartBtn" style="display:none" onclick="newGame()">🔄 Play Again</button>
</div>

<script>
  const API = '';
  let attempts = 0;
  let gameOver = false;
  const MAX = 7;

  async function newGame() {
    const res  = await fetch(`${API}/new`, { method: 'POST' });
    const data = await res.json();
    attempts = 0;
    gameOver = false;

    document.getElementById('guessInput').value = '';
    document.getElementById('guessInput').disabled = false;
    document.getElementById('guessBtn').disabled = false;
    document.getElementById('restartBtn').style.display = 'none';
    document.getElementById('history').innerHTML = '';
    setMessage(data.message, 'hint');
    renderDots();
    document.getElementById('guessInput').focus();
  }

  async function submitGuess() {
    if (gameOver) return;

    const input = document.getElementById('guessInput');
    const val   = parseInt(input.value, 10);

    if (isNaN(val) || val < 1 || val > 100) {
      setMessage('⚠️ Enter a number between 1 and 100.', 'hint');
      input.focus();
      return;
    }

    const res  = await fetch(`${API}/guess`, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ guess: val })
    });
    const data = await res.json();

    attempts = data.attempts;

    addHistory(val, data.result_label);
    setMessage(data.message, data.status);

    if (data.status === 'win' || data.status === 'lose') {
      endGame();
    } else {
      renderDots();
      input.value = '';
      input.focus();
    }
  }

  function renderDots() {
    const bar = document.getElementById('dotsBar');
    bar.innerHTML = '';
    for (let i = 0; i < MAX; i++) {
      const d = document.createElement('div');
      d.className = 'dot' +
        (i < attempts ? ' used' : '') +
        (i === attempts && !gameOver ? ' active' : '');
      bar.appendChild(d);
    }
  }

  function setMessage(text, cls) {
    const el = document.getElementById('message');
    el.textContent = text;
    el.className = 'message ' + (cls || 'hint');
  }

  function addHistory(guess, label) {
    const h = document.getElementById('history');
    const s = document.createElement('span');
    s.textContent = `#${attempts}  →  ${guess}  ${label}`;
    h.prepend(s);
  }

  function endGame() {
    gameOver = true;
    renderDots();
    document.getElementById('guessInput').disabled = true;
    document.getElementById('guessBtn').disabled = true;
    document.getElementById('restartBtn').style.display = 'inline-block';
  }

  document.getElementById('guessInput').addEventListener('keydown', e => {
    if (e.key === 'Enter') submitGuess();
  });

  // Start a new game on page load
  newGame();
</script>
</body>
</html>
